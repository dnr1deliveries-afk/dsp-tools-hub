{% extends "base.html" %}
{% block title %}— Error {{ code }}{% endblock %}
{% block content %}
<div class="row justify-content-center mt-5">
    <div class="col-md-6 text-center">
        <div class="display-1 fw-bold text-orange opacity-75 mb-2">{{ code }}</div>
        <h4 class="fw-bold mb-2">{{ title }}</h4>
        <p class="text-muted mb-4">{{ message }}</p>
        <a href="{{ url_for('index') }}" class="btn btn-warning fw-bold">
            <i class="bi bi-house-fill me-2"></i>Back to Dashboard
        </a>
    </div>
</div>
{% endblock %}
